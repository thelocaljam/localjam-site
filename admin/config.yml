# =============================================================================
#  The Local Jam — Decap CMS configuration 
# =============================================================================
#
#  ▶ STEP 1: Replace ONLY the `backend:` block below with the one DecapBridge
#    generates for your site (Dashboard → your site → it shows a ready-made
#    config). It will fill in your repo name and your unique site id.
#    Everything under `media_folder` and `collections` you can leave as-is.
#
# =============================================================================

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: thelocaljam/localjam-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/124018db-6998-441e-b27a-7b7135a2c39d/pkce
  auth_token_endpoint: /sites/124018db-6998-441e-b27a-7b7135a2c39d/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)


# Add site links in Decap CMS (optional)
site_url: https://localjam-site.nameless-band-7e82.workers.dev

# Where uploaded photos / audio are stored in the repo, and how the site links them.
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Branded logo shown on the login screen
logo_url: "data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20560%20150%27%3E%3Crect%20width%3D%27560%27%20height%3D%27150%27%20rx%3D%2718%27%20fill%3D%27%2317211B%27/%3E%3Ccircle%20cx%3D%2744%27%20cy%3D%2775%27%20r%3D%278%27%20fill%3D%27%23E39A2E%27/%3E%3Ctext%20x%3D%2768%27%20y%3D%2792%27%20font-family%3D%27Arial%20Black%2CArial%2Csans-serif%27%20font-weight%3D%27900%27%20font-size%3D%2742%27%20letter-spacing%3D%271.5%27%20fill%3D%27%23F7F1E4%27%3ETHE%20LOCAL%20JAM%3C/text%3E%3C/svg%3E"

# A friendly link back to the live site from the CMS top bar.
display_url: https://localjam-site.nameless-band-7e82.workers.dev

collections:
- name: "content"
  label: "Website"
  description: "Everything on the site lives here. Edit a section, then click Publish."
  editor:
    preview: false
  files:
  - name: "site"
    label: "The Local Jam — all content"
    file: "content/site.json"
    format: "json"
    fields:
    - {label: "Band name (logo text)", name: "brand", widget: "string", required: false}

          # ---------------- HERO ----------------
    - label: "Hero (top of page)"
      name: "hero"
      widget: "object"
      fields:
      - {label: "Eyebrow line", name: "eyebrow", widget: "string", required: false}
      - {label: "Big title", name: "title", widget: "text", hint: "Use a new line for a line break.", required: false}
      - {label: "Intro sentence", name: "sub", widget: "text", required: false}
      - label: "Background photos (they crossfade)"
        name: "images"
        widget: "list"
        required: false
        field: {label: "Photo", name: "image", widget: "image", required: false}
      - label: "Mobile background photos (upright / portrait)"
        name: "imagesMobile"
        widget: "list"
        required: false
        field: {label: "Photo", name: "image", widget: "image", required: false}
        hint: "Optional. Upload tall/vertical shots here for phones. If left empty, the desktop photos above are used on phones too."
      - {label: "Cinematic effect on the hero", name: "filmEffect", widget: "boolean", default: true, required: false, hint: "Adds faint static scanlines and a soft vignette for a cinematic look. Turn off for a clean photo."}

          # ---------------- MENU LABELS ----------------
    - label: "Menu labels"
      name: "nav"
      widget: "object"
      collapsed: true
      fields:
      - {label: "Shows", name: "shows", widget: "string", required: false}
      - {label: "Videos", name: "music", widget: "string", required: false}
      - {label: "Photos", name: "photos", widget: "string", required: false}
      - {label: "Band", name: "band", widget: "string", required: false}
      - {label: "Songs", name: "songs", widget: "string", required: false}
      - {label: "Book button", name: "book", widget: "string", required: false}
      - {label: "Tip button", name: "tip", widget: "string", required: false}

          # ---------------- ABOUT ----------------
    - label: "About"
      name: "about"
      widget: "object"
      fields:
      - {label: "Eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Headline", name: "headline", widget: "string", required: false}
      - {label: "Lead sentence", name: "lead", widget: "text", required: false}
      - {label: "Paragraph", name: "body", widget: "text", required: false}
      - {label: "Photo (beside the text)", name: "image", widget: "image", required: false}

          # ---------------- SHOWS ----------------
    - label: "Shows"
      name: "shows"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - {label: "Off-season message", name: "offseason", widget: "string", required: false, hint: "Shown automatically when there are no upcoming gigs (e.g. \"Thanks for a great season — see you again soon!\"). Visitors can still view past shows and book you."}
      - label: "Show list"
        name: "list"
        widget: "list"
        summary: "{{fields.date}} — {{fields.venue}}"
        fields:
        - {label: "Venue / event", name: "venue", widget: "string", required: false}
        - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true}
        - {label: "Time", name: "time", widget: "string", hint: "e.g. 6–8 PM", required: false}
        - {label: "Location (street + town)", name: "loc", widget: "string", required: false}
        - {label: "Town (for homepage)", name: "town", widget: "string", required: false}
        - label: "Type"
          name: "tag"
          widget: "select"
          required: false
          default: ""
          options:
          - {label: "Public show", value: ""}
          - {label: "Private event", value: "private"}
          - {label: "Has a rain date", value: "rain"}
        - {label: "Note (optional)", name: "note", widget: "string", required: false, hint: "e.g. Rain date Jul 9"}

          # ---------------- VIDEOS ----------------
        required: false
    - label: "Videos"
      name: "music"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - {label: "Section intro", name: "sub", widget: "text", required: false}
      - label: "Videos"
        name: "videos"
        widget: "list"
        required: false
        summary: "{{fields.title}}"
        fields:
        - {label: "Title", name: "title", widget: "string", required: false}
        - {label: "Caption", name: "sub", widget: "string", required: false}
        - {label: "YouTube link", name: "youtube", widget: "string", required: false, hint: "Just paste the full YouTube link (e.g. https://youtu.be/abc123 or the watch?v= URL). A bare video ID works too."}

          # ---------------- AUDIO ----------------
    - label: "Audio"
      name: "audio"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - {label: "Section intro", name: "sub", widget: "text", required: false}
      - label: "Tracks"
        name: "tracks"
        widget: "list"
        required: false
        summary: "{{fields.title}}"
        fields:
        - {label: "Title", name: "title", widget: "string", required: false}
        - {label: "Artist", name: "artist", widget: "string", required: false}
        - {label: "Audio file (MP3)", name: "src", widget: "file", required: false, hint: "Keep clips short to keep the site fast."}

          # ---------------- GALLERY ----------------
    - label: "Photo gallery"
      name: "gallery"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - label: "Photos (hidden on the site until you add at least one)"
        name: "images"
        widget: "list"
        required: false
        field: {label: "Photo", name: "image", widget: "image", required: false}

          # ---------------- REVIEWS ----------------
    - label: "Reviews / endorsements"
      name: "testimonials"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - label: "Quotes (drag to reorder; hidden on the site if empty)"
        name: "list"
        widget: "list"
        required: false
        summary: "{{fields.name}} — {{fields.quote}}"
        fields:
        - {label: "Quote", name: "quote", widget: "text", required: false}
        - {label: "Name", name: "name", widget: "string", required: false}
        - {label: "Detail (event / town)", name: "detail", widget: "string", required: false}

          # ---------------- BAND ----------------
    - label: "Band & guests"
      name: "band"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - {label: "Section intro", name: "sub", widget: "text", required: false}
      - label: "Members"
        name: "members"
        widget: "list"
        summary: "{{fields.role}} — {{fields.name}}"
        fields:
        - {label: "Name", name: "name", widget: "string", required: false}
        - {label: "Role / instrument", name: "role", widget: "string", required: false}
        - {label: "Photo", name: "photo", widget: "image", required: false}
        - {label: "Special guest?", name: "guest", widget: "boolean", default: false, required: false}

          # ---------------- SONGBOOK ----------------
        required: false
    - label: "Songbook"
      name: "songs"
      widget: "object"
      fields:
      - {label: "Section eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Section heading", name: "heading", widget: "string", required: false}
      - {label: "Section intro", name: "sub", widget: "string", required: false}
      - label: "Artists (added in any order — the site sorts them A–Z automatically)"
        name: "artists"
        widget: "list"
        field: {label: "Artist", name: "artist", widget: "string", required: false}
        required: false

          # ---------------- BOOKING ----------------
    - label: "Booking"
      name: "book"
      widget: "object"
      fields:
      - {label: "Eyebrow", name: "eyebrow", widget: "string", required: false}
      - {label: "Heading", name: "heading", widget: "string", required: false}
      - {label: "Pitch", name: "body", widget: "text", required: false}
      - label: "Event-types ticker (scrolls before booking)"
        name: "eventTypes"
        widget: "list"
        required: false
        field: {label: "Event type", name: "type", widget: "string", required: false}

          # ---------------- CONTACT & TIPS ----------------
    - label: "Contact & tips"
      name: "contact"
      widget: "object"
      fields:
      - {label: "Phone", name: "phone", widget: "string", required: false}
      - {label: "Email", name: "email", widget: "string", required: false}
      - {label: "Facebook link", name: "facebook", widget: "string", required: false}
      - {label: "Instagram link", name: "instagram", widget: "string", required: false}
      - {label: "YouTube link", name: "youtube", widget: "string", required: false}
      - {label: "Venmo username or link", name: "venmo", widget: "string", required: false, hint: "Tip buttons appear automatically once this is filled in."}
      - {label: "Brevo form action URL (for the email signup)", name: "brevo", widget: "string", required: false, hint: "In Brevo: create a subscription form, open its Share & embed / HTML code, and copy the URL inside <form action=\"...\"> (usually a sibforms.com link). Both signup boxes collect emails once this is filled in."}
      - {label: "Formspree endpoint (for the booking form)", name: "formspree", widget: "string", required: false, hint: "Create a free form at formspree.io and paste its endpoint (e.g. https://formspree.io/f/abc123). If left blank, the booking form opens the visitor's email app to you instead."}

          # ---------------- FOOTER ----------------
    - label: "Footer"
      name: "footer"
      widget: "object"
      fields:
      - {label: "Location line", name: "tagline", widget: "string", required: false}
      - {label: "Designer credit (shows as \"Site designed by …\")", name: "credit", widget: "string", required: false}

    - label: "Mailing list"
      name: "mailing"
      widget: "object"
      fields:
      - {label: "Heading", name: "heading", widget: "string", required: false}
      - {label: "Subtext", name: "sub", widget: "text", required: false}
