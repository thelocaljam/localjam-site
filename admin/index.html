<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Local Jam</title>
  <script>
    /* Band members who land on /admin get sent straight to the new login.
       The full CMS only loads when reached the admin way: /admin?cms=1
       (that's what the small "Admin access" link on the login page uses). */
    (function () {
      var params = new URLSearchParams(location.search);
      if (!params.has('cms')) {
        location.replace('https://add.thelocaljam.com');
      }
    })();
  </script>
</head>
<body>
  <!-- Only reached via …/admin?cms=1 — loads Decap's full sign-in. -->
  <script src="https://unpkg.com/decap-cms@^3.8.3/dist/decap-cms.js"></script>
</body>
</html>
